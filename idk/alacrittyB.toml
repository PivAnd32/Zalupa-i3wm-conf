[terminal.shell]
program = "/usr/bin/bash"
args = ["-l"]

[colors]
primary = { background = "#282A2E", foreground = "#C5C8C6" }

normal = { black = "#1d1f21", red = "#cc6666", green = "#b5bd68", yellow = "#F0C674", blue = "#81a2be", magenta = "#b294bb", cyan = "#70c0ba", white = "#373b41" }

bright = { black = "#666666", red = "#ff3334", green = "#9ec400", yellow = "#F0C674", blue = "#81a2be", magenta = "#b77ee0", cyan = "#54ced6", white = "#282a2e" }

cursor = { text = "#282A2E", cursor = "#F0C674" }

[window]
opacity = 0.85
blur = true
